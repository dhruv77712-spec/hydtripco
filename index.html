<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HydTrip Co.</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0a1428;color:white}
.nav{display:flex;justify-content:space-between;padding:15px;background:#0d1b2a}
.nav a{color:#ccc;margin:10px;cursor:pointer;text-decoration:none}
.section{display:none;padding:20px}
.active{display:block}
.hero{
height:80vh;display:flex;flex-direction:column;justify-content:center;
padding:30px;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
background-size:cover;
}
.btn{background:#fbbf24;padding:10px 20px;border-radius:20px;color:black;cursor:pointer;text-decoration:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.card{background:#14213d;border-radius:12px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:150px;object-fit:cover}
.price{color:#fbbf24;font-size:24px}
</style>
</head>

<body>

<div class="nav">
<h2>✈️ HydTrip</h2>
<div>
<a onclick="show('home')">Home</a>
<a onclick="show('trips')">Trips</a>
<a onclick="show('hyd')">Hyderabad</a>
</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<div class="hero">
<h1>Travel Made Premium</h1>
<p>Explore trips from Hyderabad</p>
<a class="btn" onclick="show('trips')">Explore</a>
</div>
</div>

<!-- TRIPS -->
<div id="trips" class="section">
<h2>Trips</h2>
<div class="grid">

<div class="card" onclick="openPkg('Goa','₹6,999','https://images.unsplash.com/photo-1507525428034-b723cf961d3e')">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<h3>Goa</h3>
</div>

<div class="card" onclick="openPkg('Manali','₹8,999','https://images.unsplash.com/photo-1501785888041-af3ef285b470')">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<h3>Manali</h3>
</div>

</div>
</div>

<!-- HYDERABAD -->
<div id="hyd" class="section">
<h2>Hyderabad Packages</h2>

<div class="grid">

<div class="card" onclick="openPkg('Hyderabad Full Tour','₹2,999','https://images.unsplash.com/photo-1588413335653-2c61e8a3f5d7')">
<img src="https://images.unsplash.com/photo-1588413335653-2c61e8a3f5d7">
<h3>Full Tour</h3>
</div>

<div class="card" onclick="openPkg('Charminar Visit','₹499','https://images.unsplash.com/photo-1588413335653-2c61e8a3f5d7')">
<img src="https://images.unsplash.com/photo-1588413335653-2c61e8a3f5d7">
<h3>Charminar</h3>
</div>

</div>
</div>

<!-- PACKAGE -->
<div id="package" class="section">

<img id="img" style="width:100%;height:250px;object-fit:cover">

<a onclick="show('trips')">← Back</a>

<h1 id="title"></h1>
<p class="price" id="price"></p>

<p>
✔ Hotel<br>
✔ Sightseeing<br>
✔ Pickup
</p>

<p>📞 9064809681</p>

<a id="bookBtn" class="btn">Book on WhatsApp</a>

</div>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
}

function openPkg(name,price,img){
show('package')
document.getElementById('title').innerText=name+" Package"
document.getElementById('price').innerText=price
document.getElementById('img').src=img

let msg="Hi, I want to book "+name+" package ("+price+")";
document.getElementById("bookBtn").href=
"https://wa.me/919064809681?text="+encodeURIComponent(msg);
}
</script>

</body>
</html>
