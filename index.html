<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HydTrip Co.</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b1220;color:white}

/* NAVBAR */
.nav{
display:flex;justify-content:space-between;align-items:center;
padding:15px 40px;background:rgba(0,0,0,0.7);
position:fixed;width:100%;z-index:100
}
.nav a{color:#ddd;margin:0 10px;text-decoration:none}
.nav .btn{background:#fbbf24;color:black;padding:10px 20px;border-radius:20px}

/* HERO */
.hero{
height:100vh;display:flex;align-items:center;padding:60px;
background:linear-gradient(to right,rgba(0,0,0,0.7),rgba(0,0,0,0.2)),
url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
background-size:cover
}
.hero h1{font-size:60px;margin:0}
.hero span{color:#fbbf24}

/* SECTION */
.section{padding:60px}

/* CARDS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px
}
.card{
position:relative;
border-radius:15px;
overflow:hidden;
cursor:pointer
}
.card img{width:100%;height:200px;object-fit:cover}
.card .overlay{
position:absolute;bottom:0;
background:linear-gradient(transparent,black);
padding:15px;width:100%
}
.price{color:#fbbf24;font-weight:bold}

/* STRIP */
.strip{
background:#111;padding:20px;display:flex;justify-content:space-around;margin-top:40px
}

/* FOOTER */
.footer{
background:#0d1b2a;padding:30px;text-align:center;margin-top:40px
}
</style>
</head>

<body>

<div class="nav">
<h2>✈️ HydTrip</h2>
<div>
<a href="#trips">Trips</a>
<a href="#hyd">Hyderabad</a>
</div>
<a id="navBtn" class="btn">Book on WhatsApp</a>
</div>

<div class="hero">
<div>
<h1>Your Journey,<br><span>Our Priority</span></h1>
<p>Premium trips from Hyderabad</p>
</div>
</div>

<div id="trips" class="section">
<h2>Explore Top Destinations</h2>

<div class="grid">

<div class="card" onclick="openPkg('Goa','₹6,999','https://images.unsplash.com/photo-1507525428034-b723cf961d3e')">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<div class="overlay">
<h3>Goa</h3>
<p class="price">₹6,999</p>
</div>
</div>

<div class="card" onclick="openPkg('Manali','₹8,999','https://images.unsplash.com/photo-1501785888041-af3ef285b470')">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<div class="overlay">
<h3>Manali</h3>
<p class="price">₹8,999</p>
</div>
</div>

<div class="card" onclick="openPkg('Coorg','₹7,999','https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<div class="overlay">
<h3>Coorg</h3>
<p class="price">₹7,999</p>
</div>
</div>

</div>
</div>

<div id="hyd" class="section">
<h2>Explore Hyderabad</h2>

<div class="grid">

<div class="card" onclick="openPkg('Charminar','₹499','https://images.unsplash.com/photo-1588413335653-2c61e8a3f5d7')">
<img src="https://images.unsplash.com/photo-1588413335653-2c61e8a3f5d7">
<div class="overlay">
<h3>Charminar</h3>
<p class="price">₹499</p>
</div>
</div>

<div class="card" onclick="openPkg('Golconda','₹699','https://images.unsplash.com/photo-1606293926249-ed22e1d3c30d')">
<img src="https://images.unsplash.com/photo-1606293926249-ed22e1d3c30d">
<div class="overlay">
<h3>Golconda Fort</h3>
<p class="price">₹699</p>
</div>
</div>

</div>
</div>

<div class="strip">
<div>✔ Best Prices</div>
<div>✔ Secure Travel</div>
<div>✔ 24/7 Support</div>
</div>

<div class="footer">
© 2025 HydTrip Co.
</div>

<script>
function openPkg(name,price,img){
let msg="Hi I want to book "+name+" package ("+price+")";
window.open("https://wa.me/919064809681?text="+encodeURIComponent(msg))
}
</script>

</body>
</html>
