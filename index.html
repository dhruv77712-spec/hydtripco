<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HydTrip Co.</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0a1428;
  color: white;
}

/* NAVBAR */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: #0a1428;
}

.nav a {
  color: white;
  text-decoration: none;
  margin-left: 15px;
}

/* HERO */
.hero {
  padding: 30px 20px;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
  url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
  background-size: cover;
}

.hero h1 {
  font-size: 32px;
}

.hero p {
  color: #ccc;
}

/* CARDS */
.section {
  padding: 20px;
}

.cards {
  display: flex;
  overflow-x: auto;
}

.card {
  min-width: 250px;
  margin-right: 15px;
  background: #162447;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card h3 {
  padding: 10px;
}

/* DETAILS POPUP */
.details {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #162447;
  padding: 20px;
  border-radius: 20px 20px 0 0;
}

.details h2 {
  margin-top: 0;
}

.close {
  float: right;
  cursor: pointer;
}
</style>

</head>
<body>

<!-- NAV -->
<div class="nav">
  <h2>✈️ HydTrip Co.</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Trips</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Your Journey,<br>Our Priority</h1>
  <p>Premium Travel Experiences from Hyderabad</p>
</div>

<!-- DESTINATIONS -->
<div class="section">
  <h2>Explore Top Destinations</h2>

  <div class="cards">

    <div class="card" onclick="openDetails('Goa', 8000, 2500, 4500)">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <h3>Goa</h3>
    </div>

    <div class="card" onclick="openDetails('Manali', 12000, 4000, 7000)">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
      <h3>Manali</h3>
    </div>

    <div class="card" onclick="openDetails('Coorg', 9000, 3000, 5500)">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <h3>Coorg</h3>
    </div>

    <div class="card" onclick="openDetails('Araku Valley', 7000, 2000, 4000)">
      <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429">
      <h3>Araku</h3>
    </div>

  </div>
</div>

<!-- DETAILS POPUP -->
<div class="details" id="detailsBox">
  <span class="close" onclick="closeDetails()">❌</span>
  <h2 id="placeName"></h2>

  <p>🚗 Cab: ₹<span id="cab"></span></p>
  <p>🚆 Train: ₹<span id="train"></span></p>
  <p>✈️ Flight: ₹<span id="flight"></span></p>

  <a href="https://wa.me/919064809681" style="
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#00c896;
    color:black;
    border-radius:20px;
    text-decoration:none;">
    Book on WhatsApp
  </a>
</div>

<script>
function openDetails(name, cab, train, flight) {
  document.getElementById('detailsBox').style.display = 'block';
  document.getElementById('placeName').innerText = name;
  document.getElementById('cab').innerText = cab;
  document.getElementById('train').innerText = train;
  document.getElementById('flight').innerText = flight;
}

function closeDetails() {
  document.getElementById('detailsBox').style.display = 'none';
}
</script>

</body>
</html>
